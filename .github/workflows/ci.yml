name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-quality:
    name: Python quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  config-validation:
    name: Config validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Grafana dashboard JSON
        run: python -m json.tool grafana/provisioning/dashboards/data-quality-overview.json >/dev/null

      - name: Validate Docker Compose file
        run: docker compose config --quiet

  postgres-smoke-test:
    name: PostgreSQL smoke test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dq_monitoring
          POSTGRES_USER: dq_user
          POSTGRES_PASSWORD: dq_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dq_user -d dq_monitoring"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+psycopg://dq_user:dq_password@localhost:5432/dq_monitoring
      PGPASSWORD: dq_password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run demo pipeline
        run: python scripts/run_pipeline.py --days 5 --reset

      - name: Verify mart output
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text

          engine = create_engine("postgresql+psycopg://dq_user:dq_password@localhost:5432/dq_monitoring")
          with engine.begin() as conn:
              rows = conn.execute(text("select status, count(*) from mart_source_status group by status")).all()

          if not rows:
              raise SystemExit("mart_source_status returned no rows")

          print(rows)
          PY
